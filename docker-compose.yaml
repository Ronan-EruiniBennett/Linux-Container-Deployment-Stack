services:

  server_emulator:
    build: ./server_emulator
    environment:
      TARGET_URL: "http://flask:5000/server/data"
    depends_on:
      flask:
        condition: service_healthy

  flask:
    build: .
    ports: 
      - "127.0.0.1:5000:5000"
    environment:
      DATABASE_URL: postgresql://app_user:password@postgres:5432/app_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
